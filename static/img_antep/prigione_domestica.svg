<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0618"/>
      <stop offset="100%" stop-color="#1a0a14"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <!-- House outline -->
  <path d="M250 280 L400 160 L550 280 Z" stroke="#f472b6" stroke-width="2" fill="rgba(244,114,182,0.05)"/>
  <rect x="280" y="280" width="240" height="120" stroke="#f472b6" stroke-width="2" fill="rgba(244,114,182,0.03)" rx="2"/>
  <!-- Bars over house -->
  <line x1="300" y1="150" x2="300" y2="400" stroke="#e040fb" stroke-width="3" opacity="0.7"/>
  <line x1="340" y1="150" x2="340" y2="400" stroke="#e040fb" stroke-width="3" opacity="0.5"/>
  <line x1="380" y1="150" x2="380" y2="400" stroke="#e040fb" stroke-width="3" opacity="0.7"/>
  <line x1="420" y1="150" x2="420" y2="400" stroke="#e040fb" stroke-width="3" opacity="0.5"/>
  <line x1="460" y1="150" x2="460" y2="400" stroke="#e040fb" stroke-width="3" opacity="0.7"/>
  <line x1="500" y1="150" x2="500" y2="400" stroke="#e040fb" stroke-width="3" opacity="0.5"/>
  <!-- Broken chain -->
  <path d="M580 200 C620 180 660 220 640 260 C620 300 580 280 600 240" stroke="#9080b4" stroke-width="2" fill="none" stroke-dasharray="6 4"/>
  <circle cx="595" cy="235" r="8" stroke="#f472b6" stroke-width="2" fill="none"/>
  <text x="40" y="60" font-family="Syne, sans-serif" font-size="24" font-weight="800" fill="#f5f0ff">LA PRIGIONE DOMESTICA</text>
  <text x="40" y="90" font-family="JetBrains Mono, monospace" font-size="11" fill="#9080b4" letter-spacing="2">VIOLENZA � EDUCAZIONE CIVICA</text>
  <text x="40" y="420" font-family="DM Sans, sans-serif" font-size="13" fill="#f472b6" opacity="0.8">Rompi il silenzio</text>
</svg>
