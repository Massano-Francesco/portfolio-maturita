  </defs>
  <rect width="800" height="450" fill="url(#sky)"/>
  <circle cx="620" cy="110" r="55" fill="url(#sun)" opacity="0.85"/>
  <path d="M0 320 Q200 280 400 300 T800 290 L800 450 L0 450Z" fill="#1c1008" opacity="0.7"/>
  <path d="M0 350 Q250 320 500 340 T800 330 L800 450 L0 450Z" fill="#0a0618"/>
