    <line x1="30" y1="-70" x2="30" y2="70" stroke="#e040fb" stroke-width="2"/>
    <line x1="15" y1="-40" x2="45" y2="-40" stroke="#c4b5fd" stroke-width="1" opacity="0.6"/>
    <line x1="10" y1="0" x2="50" y2="0" stroke="#c4b5fd" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="40" x2="45" y2="40" stroke="#c4b5fd" stroke-width="1" opacity="0.6"/>
  </g>
  <text x="40" y="60" font-family="Syne, sans-serif" font-size="28" font-weight="800" fill="#f5f0ff" letter-spacing="4">I PELLEROSSA</text>
  <text x="40" y="90" font-family="JetBrains Mono, monospace" font-size="11" fill="#9080b4" letter-spacing="3">PRESBITERIANESIMO � STORIA</text>
